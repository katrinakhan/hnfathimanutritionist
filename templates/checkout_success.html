<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase complete | HN Fathima</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="shop-nav">
            <a href="{{ url_for('index') }}">← Home</a>
            <a href="{{ url_for('shop') }}">Courses</a>
        </nav>

        <section class="course-hero">
            <h1>You're in!</h1>
            <p class="subtitle">
                Payment received for <strong>{{ course.title }}</strong>.
                Your lessons are ready to watch.
            </p>
            <a
                class="cta-button"
                href="{{ url_for('watch_course', course_id=course.id, access=access_token) }}"
            >
                Start watching
            </a>
            <p class="lock-in-text">
                Bookmark this page or the course player link so you can return later on this device/browser.
            </p>
        </section>
    </div>
</body>
</html>
